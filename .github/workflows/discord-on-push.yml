name: Discord on Push

on:
  push:

permissions:
  contents: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send push notification to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const webhook = process.env.DISCORD_WEBHOOK_URL;
            if (!webhook) {
              core.setFailed("Missing secret: DISCORD_WEBHOOK_URL");
              return;
            }

            const branch = context.ref.replace("refs/heads/", "");
            const commits = context.payload.commits || [];
            const shown = commits.slice(0, 5);
            const commitLines = shown.flatMap((c) => {
              const sha = (c.id || "").slice(0, 7);
              const rawMessage = (c.message || "").trim();
              const messageLines = rawMessage ? rawMessage.split("\n") : [];
              const title = (messageLines[0] || "(no commit message)").trim();
              const section = [`* \`${sha}\` ${title}`];
              const descriptionLines = messageLines
                .slice(1)
                .map((line) => line.trim())
                .filter((line) => line.length > 0);
              if (descriptionLines.length) {
                section.push(...descriptionLines.map((line) => `  - ${line}`));
              }
              return section;
            });

            if (commits.length > shown.length) {
              commitLines.push(`...and ${commits.length - shown.length} more`);
            }

            let versionLabel = "-----";
            try {
              const versionStatePath = path.join(process.cwd(), ".version_state.json");
              if (fs.existsSync(versionStatePath)) {
                const state = JSON.parse(fs.readFileSync(versionStatePath, "utf8"));
                const major = Number.isFinite(Number(state.major)) ? Number(state.major) : null;
                const minor = Number.isFinite(Number(state.minor)) ? Number(state.minor) : null;
                const patch = Number.isFinite(Number(state.patch)) ? Number(state.patch) : null;
                if (major !== null && minor !== null && patch !== null) {
                  versionLabel = `v${major}.${minor}.${patch}`;
                }
              }
            } catch (error) {
              core.info(`Could not read version: ${String(error)}`);
            }

            const compareUrl = context.payload.compare || "";
            const repoName = `${context.repo.owner}/${context.repo.repo}`;
            const contentParts = [
              "A new change has been made!",
              "",
              `Push to **${branch}**`,
              `Version: **${versionLabel}**`,
              `Repo: \`${repoName}\``,
              `Pusher: **${context.actor}**`,
              `Commits: **${commits.length}**`,
            ];
            if (commitLines.length) {
              contentParts.push("", ...commitLines);
            }
            if (compareUrl) {
              contentParts.push("", `<${compareUrl}>`);
            }

            const response = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content: contentParts.join("\n") }),
            });

            if (!response.ok) {
              const body = await response.text();
              core.setFailed(`Discord webhook failed (${response.status}): ${body}`);
            }
