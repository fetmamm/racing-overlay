name: Discord on Push

on:
  push:

permissions:
  contents: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send push notification to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhook = process.env.DISCORD_WEBHOOK_URL;
            if (!webhook) {
              core.setFailed("Missing secret: DISCORD_WEBHOOK_URL");
              return;
            }

            const branch = context.ref.replace("refs/heads/", "");
            const commits = context.payload.commits || [];
            const shown = commits.slice(0, 5);
            const lines = shown.map((c) => {
              const sha = (c.id || "").slice(0, 7);
              const message = (c.message || "").split("\n")[0];
              const author = c.author?.name || "unknown";
              return `- \`${sha}\` ${message} - ${author}`;
            });

            if (commits.length > shown.length) {
              lines.push(`- ...och ${commits.length - shown.length} till`);
            }

            const compareUrl = context.payload.compare || "";
            const summary = lines.length ? lines.join("\n") : "No commit details available.";
            const repoName = `${context.repo.owner}/${context.repo.repo}`;

            const response = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                content: "A new change was pushed.",
                embeds: [
                  {
                    title: "New Change In Repository",
                    color: 3447003,
                    fields: [
                      { name: "Repository", value: `\`${repoName}\``, inline: true },
                      { name: "Branch", value: `\`${branch}\``, inline: true },
                      { name: "Pushed by", value: `**${context.actor}**`, inline: true },
                      { name: "Commits", value: `**${commits.length}**`, inline: true },
                    ],
                    description: `${summary}${compareUrl ? `\n\n${compareUrl}` : ""}`,
                    footer: { text: "GitHub Push Notification" },
                    timestamp: new Date().toISOString(),
                  },
                ],
              }),
            });

            if (!response.ok) {
              const body = await response.text();
              core.setFailed(`Discord webhook failed (${response.status}): ${body}`);
            }
