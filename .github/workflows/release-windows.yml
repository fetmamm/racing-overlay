name: Build Zwift Overlay EXE

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "Zwift Overlay.exe"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build/runtime dependencies
        shell: powershell
        run: |
          py -3 -m pip install --upgrade pip
          py -3 -m pip install pyinstaller bleak openant pyusb

      - name: Stamp build version
        shell: powershell
        run: |
          $runNumber = "${{ github.run_number }}"
          $version = "v0.0.$runNumber (Beta)"
          $state = @{
            build_version = $version
            major = 0
            minor = 0
            patch = [int]$runNumber
            fingerprint = ""
          }
          $json = $state | ConvertTo-Json
          Set-Content -Path ".version_state.json" -Value $json
          Write-Host "Stamped build version: $version"

      - name: Build Zwift Overlay.exe
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          py -3 -m PyInstaller --noconfirm --clean --onefile --windowed --name "Zwift Overlay" --add-data ".version_state.json;." app.py
          Copy-Item "dist\Zwift Overlay.exe" "Zwift Overlay.exe" -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zwift-Overlay-exe
          path: dist/Zwift Overlay.exe

      - name: Commit portable EXE to repository
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Zwift Overlay.exe"
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: update portable exe [skip ci]"
            git push
          } else {
            Write-Host "No EXE changes to commit."
          }
