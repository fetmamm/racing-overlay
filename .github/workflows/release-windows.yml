name: Build and Publish Windows EXE

on:
  push:
    branches:
      - main
      - stable
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build/runtime dependencies
        shell: powershell
        run: |
          py -3 -m pip install --upgrade pip
          py -3 -m pip install pyinstaller bleak openant pyusb

      - name: Build Zwift Overlay.exe
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          py -3 -m PyInstaller --noconfirm --clean --onefile --windowed --name "Zwift Overlay" --add-data ".version_state.json;." app.py

      - name: Set release target
        id: release_target
        shell: powershell
        run: |
          if ("${{ github.ref_name }}" -eq "main") {
            "tag=latest" >> $env:GITHUB_OUTPUT
            "name=Latest" >> $env:GITHUB_OUTPUT
          }
          elseif ("${{ github.ref_name }}" -eq "stable") {
            "tag=stable" >> $env:GITHUB_OUTPUT
            "name=Stable" >> $env:GITHUB_OUTPUT
          }
          else {
            throw "Unsupported branch: ${{ github.ref_name }}"
          }

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_target.outputs.tag }}
          name: ${{ steps.release_target.outputs.name }}
          files: dist/Zwift Overlay.exe
          overwrite_files: true
          generate_release_notes: false
          make_latest: false
